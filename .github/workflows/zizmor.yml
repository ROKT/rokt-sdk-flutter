name: Zizmor Security Scan

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {} # deny-by-default; job below grants only what it needs

jobs:
  zizmor:
    name: Scan GitHub Actions workflows
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read # zizmor resolves reusable workflow/action metadata via GitHub API
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        continue-on-error: true # Permanent — reports findings without blocking PRs
        with:
          advanced-security: false
          annotations: true
